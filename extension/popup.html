<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; background: #1a1a2e; color: white; font-family: sans-serif; padding: 15px; }
        .nav { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-btn { cursor: pointer; color: #888; font-size: 12px; font-weight: bold; }
        .nav-btn.active { color: #f15a24; }
        .card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .tag { background: #e94560; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-right: 5px; }
        .hist-item { font-size: 11px; border-bottom: 1px dotted #333; padding: 5px 0; }
    </style>
</head>
<body>
    <div class="nav">
        <span id="tab-scan" class="nav-btn active">LIVE SCAN</span>
        <span id="tab-hist" class="nav-btn">HISTORY</span>
    </div>
    <div id="view-scan">
        <div class="card"><strong>Current Site:</strong><div id="url-text" style="font-size:10px; color:#888"></div></div>
        <div class="card"><strong>Tech Stack:</strong><div id="tech-tags" style="margin-top:5px"></div></div>
    </div>
    <div id="view-hist" style="display:none">
        <div id="hist-list"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
